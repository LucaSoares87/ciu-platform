version: '3.9'

services:
  db:
    image: postgis/postgis:14-3.3
    container_name: ciu_db
    environment:
      POSTGRES_DB: ciu
      POSTGRES_USER: ciu
      POSTGRES_PASSWORD: ciupassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: ciu_backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://ciu:ciupassword@db:5432/ciu
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
    name: ciu_postgres_data